////////////
function parseHtml( pureText ) {
  let lineBreakOpen = false

  return pureText.split('\n').map(v => {
    if (v) {
      v = v.trim()
      
      if (!lineBreakOpen && v.endsWith(' -')) { // start of the lineBreak paragraph
        lineBreakOpen = true
        return '<p>' + v.replace(/ -$/, '') + '<br>'
      
      } else if (lineBreakOpen && v.endsWith(' -')) {   // inbetween the lineBreak paragraph
        return v.replace(/ -$/, '') + '<br>'

      } else if (lineBreakOpen && !v.endsWith(' -')) {  // this is end of lineBreak paragraph
        lineBreakOpen = false
        return v + '</p>'

      } else {    // normal paragraph so we put <p>...............</p>
        return '<p>' + v + '</p>'
      }
    }

  }).join('')
}

function parseSootInfo( sootOj ) {
